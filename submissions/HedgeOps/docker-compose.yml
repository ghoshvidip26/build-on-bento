version: '3.8'

services:
  chaosmarket:
    build: .
    container_name: chaosmarket
    restart: always
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - ANAKIN_API_KEY=${ANAKIN_API_KEY:-mock_anakin_key}
      - ANAKIN_BASE_URL=${ANAKIN_BASE_URL:-https://api.anakin.sre/v1}
      - BENTO_API_KEY=${BENTO_API_KEY:-mock_bento_key}
      - BENTO_PRIVATE_KEY=${BENTO_PRIVATE_KEY:-mock_bento_private_key}
      - TARGET_REPO=${TARGET_REPO:-facebook/react}
      - POLL_INTERVAL=${POLL_INTERVAL:-60000}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
